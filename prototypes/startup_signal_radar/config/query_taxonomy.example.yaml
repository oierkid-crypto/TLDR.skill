version: 1
purpose: >-
  Example taxonomy for mining complaint and wish signals that fit a 1–2 person,
  AI-leveraged, light-ops startup lens.

audience_categories:
  2b:
    description: business buyers, operators, and teams with workflow/software pain
    seed_user_segments:
      - founders
      - sales teams
      - recruiters
      - marketers
      - small business owners
    platform_hints:
      reddit:
        - sales
        - smallbusiness
        - Entrepreneur
        - SaaS
        - startups
  2c:
    description: consumers with personal-life, household, shopping, or lifestyle pain
    seed_user_segments:
      - consumers
      - parents
      - students
      - shoppers
      - wellness users
    platform_hints:
      reddit:
        - Frugal
        - buyitforlife
        - productivity
        - skincareaddiction
        - personalfinance
  2p:
    description: prosumers who behave like advanced individuals or solo operators
    seed_user_segments:
      - creators
      - freelancers
      - indie hackers
      - ecommerce sellers
      - developers
    platform_hints:
      reddit:
        - creators
        - freelance
        - Entrepreneur
        - selfhosted
        - webdev

positive_signal_groups:
  pain_words:
    en:
      - annoying
      - frustrating
      - clunky
      - broken
      - slow
      - manual
      - repetitive
      - time-consuming
      - expensive
      - not worth it
    zh:
      - 难用
      - 麻烦
      - 踩雷
      - 避坑
      - 太贵
      - 不方便
      - 折腾
      - 反人类
      - 后悔买
  workflow_words:
    en:
      - summarize
      - organize
      - sync
      - export
      - classify
      - extract
      - follow up
      - update crm
      - clean up notes
    zh:
      - 整理
      - 同步
      - 导出
      - 分类
      - 提取
      - 汇总
      - 回复
      - 跟进
  wish_words:
    en:
      - i wish there was
      - looking for a tool
      - alternative to
      - need something that
      - would pay for
    zh:
      - 有没有更好的
      - 求推荐替代
      - 希望有个工具能
      - 想找个工具
      - 愿意付费
  user_segments:
    - developers
    - founders
    - recruiters
    - sales teams
    - marketers
    - ecommerce sellers
    - creators
    - small business owners
  distribution_hints:
    search_intent_phrases:
      - alternative to
      - best tool for
      - how to automate
      - template for
      - 有没有更好的
      - 平替
      - 自动化
      - 求推荐

downrank_signal_groups:
  heavy_ops_markers:
    en:
      - local event
      - in-person community
      - field sales
      - on-site training
      - enterprise procurement
      - managed service
    zh:
      - 线下活动
      - 办社群
      - 地推
      - 上门服务
      - 线下培训
      - 重运营
  heavy_custom_service_markers:
    en:
      - custom consulting
      - bespoke service
      - white glove onboarding
    zh:
      - 定制咨询
      - 陪跑服务
      - 人工代做
  weak_ai_fit_markers:
    en:
      - purely relationship-driven
      - requires local trust network
    zh:
      - 强关系驱动
      - 必须线下信任

query_templates:
  replacement_template: >-
    ("alternative to" OR "looking for a better" OR "switching from") AND
    <tool_or_category> AND ("too expensive" OR "clunky" OR "slow" OR "broken")
  repetitive_workflow_template: >-
    ("manually" OR "every time" OR "time-consuming" OR "repetitive") AND
    <workflow> AND ("wish there was" OR "need a tool" OR "hate doing this")
  chinese_consumption_template: >-
    <品类词/场景词> AND ("避坑" OR "踩雷" OR "麻烦" OR "太贵" OR "不方便" OR "有没有更好的")

scoring_guidance:
  prioritize_when:
    - repeated workflow pain appears across multiple users
    - users explicitly seek alternatives or better tools
    - pain can be solved by software or an AI agent, not labor-heavy operations
    - acquisition could plausibly work through search or self-serve landing pages
  downrank_when:
    - solution depends on offline events, local trust, or relationship sales
    - delivery requires repeated manual service by humans
    - AI would be ornamental rather than core to unit economics
